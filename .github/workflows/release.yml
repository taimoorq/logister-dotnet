name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.3.
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Verify release version
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: bash scripts/verify-release-version.sh "$TAG_NAME"

      - name: Restore
        run: dotnet restore Logister.sln

      - name: Build Logister
        run: dotnet build src/Logister/Logister.csproj --configuration Release --no-restore -v minimal

      - name: Build Logister.AspNetCore
        run: dotnet build src/Logister.AspNetCore/Logister.AspNetCore.csproj --configuration Release --no-restore -v minimal

      - name: Run tests
        run: dotnet run --project tests/Logister.Tests/Logister.Tests.csproj --configuration Release --no-restore

      - name: Pack Logister
        run: dotnet pack src/Logister/Logister.csproj --configuration Release --no-build --output artifacts/packages

      - name: Pack Logister.AspNetCore
        run: dotnet pack src/Logister.AspNetCore/Logister.AspNetCore.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: logister-dotnet-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error

      - name: Check NuGet package versions
        id: nuget_packages
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${TAG_NAME#v}"
          logister_versions="$(curl --fail --silent https://api.nuget.org/v3-flatcontainer/logister/index.json || echo '{"versions":[]}')"
          aspnetcore_versions="$(curl --fail --silent https://api.nuget.org/v3-flatcontainer/logister.aspnetcore/index.json || echo '{"versions":[]}')"

          logister_exists=false
          aspnetcore_exists=false

          if echo "$logister_versions" | grep -q "\"${version}\""; then
            logister_exists=true
          fi

          if echo "$aspnetcore_versions" | grep -q "\"${version}\""; then
            aspnetcore_exists=true
          fi

          echo "logister_exists=${logister_exists}" >> "$GITHUB_OUTPUT"
          echo "aspnetcore_exists=${aspnetcore_exists}" >> "$GITHUB_OUTPUT"

          if [ "$logister_exists" = "true" ] && [ "$aspnetcore_exists" = "true" ]; then
            echo "packages_exist=true" >> "$GITHUB_OUTPUT"
            echo "Logister ${version} and Logister.AspNetCore ${version} already exist on NuGet."
          else
            echo "packages_exist=false" >> "$GITHUB_OUTPUT"
            echo "At least one NuGet package for ${version} is missing; publishing will continue."
          fi

      - name: Ensure NuGet API key is configured
        if: steps.nuget_packages.outputs.packages_exist != 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::Missing NUGET_API_KEY repository secret."
            exit 1
          fi

      - name: Publish packages to NuGet
        if: steps.nuget_packages.outputs.packages_exist != 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Build release notes from changelog
        env:
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          title="$(awk -v tag="$TAG_NAME" '
            $0 ~ "^## " tag "([[:space:]]|-|$)" {
              sub(/^## /, "")
              print
              exit
            }
          ' CHANGELOG.md)"

          if [ -z "$title" ]; then
            echo "::error::Could not find a CHANGELOG.md heading for $TAG_NAME."
            exit 1
          fi

          awk -v tag="$TAG_NAME" '
            $0 ~ "^## " tag "([[:space:]]|-|$)" {capture=1; next}
            capture && /^## / {exit}
            capture {print}
          ' CHANGELOG.md > release-notes.md

          if ! grep -q '[^[:space:]]' release-notes.md; then
            echo "Release $TAG_NAME" > release-notes.md
          fi

          echo "RELEASE_TITLE=$title" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "$TAG_NAME" \
              --verify-tag \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --latest
          fi
